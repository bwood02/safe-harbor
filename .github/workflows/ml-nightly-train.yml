name: ML Nightly Train

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  train-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PYTHONUNBUFFERED: '1'
      MODELS_DIR: models
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
      AZURE_BLOB_CONTAINER: ${{ secrets.AZURE_BLOB_CONTAINER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml-pipelines/requirements.txt
          pip install -r ml_api/requirements.txt
          pip install -e ml_service

      - name: Run all training scripts
        run: |
          python scripts/train_donor_churn.py
          python scripts/train_donor_high_value.py
          python scripts/train_resident_wellbeing.py
          python scripts/train_early_warning.py
          python scripts/train_reintegration_readiness.py
          python scripts/train_social_engagement.py

      - name: Build run metadata
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          from pathlib import Path

          models = [
              "donor_churn_rf.joblib",
              "donor_high_value_rf.joblib",
              "resident_wellbeing_rf.joblib",
              "early_warning_rf.joblib",
              "reintegration_rf.joblib",
              "social_engagement_rf.joblib",
          ]
          root = Path("models")
          out = {
              "generated_at_utc": dt.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
              "git_sha": os.environ.get("GITHUB_SHA"),
              "models": [],
          }
          for name in models:
              p = root / name
              out["models"].append(
                  {
                      "filename": name,
                      "exists": p.exists(),
                      "size_bytes": p.stat().st_size if p.exists() else 0,
                  }
              )
          Path("models/latest.json").write_text(json.dumps(out, indent=2), encoding="utf-8")
          print("Wrote models/latest.json")
          PY

      - name: Upload model artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: ml-models-${{ github.run_id }}
          path: |
            models/*.joblib
            models/latest.json

      - name: Azure login
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Publish models to Azure Blob (optional)
        if: ${{ env.AZURE_STORAGE_ACCOUNT != '' && env.AZURE_BLOB_CONTAINER != '' }}
        run: |
          stamp=$(date -u +%Y-%m-%d)
          for f in models/*.joblib; do
            name=$(basename "$f")
            az storage blob upload \
              --account-name "$AZURE_STORAGE_ACCOUNT" \
              --container-name "$AZURE_BLOB_CONTAINER" \
              --name "models/$stamp/$name" \
              --file "$f" \
              --auth-mode login \
              --overwrite true
            az storage blob upload \
              --account-name "$AZURE_STORAGE_ACCOUNT" \
              --container-name "$AZURE_BLOB_CONTAINER" \
              --name "models/latest/$name" \
              --file "$f" \
              --auth-mode login \
              --overwrite true
          done
          az storage blob upload \
            --account-name "$AZURE_STORAGE_ACCOUNT" \
            --container-name "$AZURE_BLOB_CONTAINER" \
            --name "models/latest/latest.json" \
            --file models/latest.json \
            --auth-mode login \
            --overwrite true
