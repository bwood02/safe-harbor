name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --warnaserror

      - name: Test
        run: dotnet test --no-build --verbosity normal
        continue-on-error: true

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets
        run: |
          echo "Checking for potential secrets in committed files..."
          if grep -rn "password\s*=\s*\"" --include="*.cs" --include="*.ts" --include="*.tsx" --include="*.json" . \
            | grep -v "node_modules" \
            | grep -v ".example" \
            | grep -v "PasswordOptions" \
            | grep -v "passwordRegex" \
            | grep -v "// " \
            | grep -v "appsettings.example"; then
            echo "WARNING: Possible hardcoded credentials found. Review above matches."
          else
            echo "No obvious secrets detected."
          fi
